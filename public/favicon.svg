<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Taiji Center -->
  <g transform="translate(50, 50) scale(0.35)">
    <circle cx="0" cy="0" r="48" fill="white" stroke="black" stroke-width="2"/>
    <path d="M 0 -48 A 48 48 0 0 1 0 48 A 24 24 0 0 1 0 0 A 24 24 0 0 0 0 -48" fill="black"/>
    <circle cx="0" cy="-24" r="8" fill="white"/>
    <circle cx="0" cy="24" r="8" fill="black"/>
  </g>

  <!-- Bagua Trigrams -->
  <g fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round">
    <!-- Top: Heaven (Qian) -->
    <g transform="rotate(0, 50, 50) translate(50, 22)">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="-10" y1="4" x2="10" y2="4"/>
      <line x1="-10" y1="8" x2="10" y2="8"/>
    </g>
    <!-- Bottom: Earth (Kun) -->
    <g transform="rotate(180, 50, 50) translate(50, 22)">
      <line x1="-10" y1="0" x2="-2" y2="0"/> <line x1="2" y1="0" x2="10" y2="0"/>
      <line x1="-10" y1="4" x2="-2" y2="4"/> <line x1="2" y1="4" x2="10" y2="4"/>
      <line x1="-10" y1="8" x2="-2" y2="8"/> <line x1="2" y1="8" x2="10" y2="8"/>
    </g>
    <!-- Right: Water (Kan) -->
    <g transform="rotate(90, 50, 50) translate(50, 22)">
      <line x1="-10" y1="0" x2="-2" y2="0"/> <line x1="2" y1="0" x2="10" y2="0"/>
      <line x1="-10" y1="4" x2="10" y2="4"/>
      <line x1="-10" y1="8" x2="-2" y2="8"/> <line x1="2" y1="8" x2="10" y2="8"/>
    </g>
    <!-- Left: Fire (Li) -->
    <g transform="rotate(270, 50, 50) translate(50, 22)">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="-10" y1="4" x2="-2" y2="4"/> <line x1="2" y1="4" x2="10" y2="4"/>
      <line x1="-10" y1="8" x2="10" y2="8"/>
    </g>
  </g>
</svg>
